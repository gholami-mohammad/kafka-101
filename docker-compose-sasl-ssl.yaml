---
services:
    ssl-generator:
        image: confluentinc/cp-kafka:7.6.1
        container_name: ssl-generator
        volumes:
            - ./secrets:/etc/kafka/secrets
            - ./scripts:/etc/kafka/scripts
        environment:
            - KEYSTORE_PASSWORD=keystoreTKtPspFDZ2CYz3EluZMha24Drp
            - TRUSTSTORE_PASSWORD=truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            - CA_PASSWORD=caRstSWx9LvFSs3cjnBVkk1UhMyQQ
            - CLIENT_PASS=clinetOLPrcS2pLLeN8WJmr1EVmEFCc
        command: >
            bash -c '
                /etc/kafka/scripts/generate-sasl-client-files.sh
                /etc/kafka/scripts/generate-ssl-encryption.sh
            '

    controller-1:
        image: confluentinc/cp-kafka:7.6.1
        container_name: controller-1
        depends_on:
            ssl-generator:
                condition: service_completed_successfully
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SASL_SSL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # SASL properties
            KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
            KAFKA_SECURITY_INTER_BROKER_PROTOCOL: SASL_SSL

            # JAAS config - broker listener
            KAFKA_LISTENER_NAME_SASL_SSL_PLAIN_SASL_JASS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";
            # JASS config - controller
            KAFKA_LISTENER_NAME_CONTROLLER_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret";
            # Other
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    controller-2:
        image: confluentinc/cp-kafka:7.6.1
        container_name: controller-2
        depends_on:
            ssl-generator:
                condition: service_completed_successfully
        environment:
            KAFKA_NODE_ID: 2
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SASL_SSL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # SASL properties
            KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
            KAFKA_SECURITY_INTER_BROKER_PROTOCOL: SASL_SSL

            # JAAS config - broker listener
            KAFKA_LISTENER_NAME_SASL_SSL_PLAIN_SASL_JASS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";
            # JASS config - controller
            KAFKA_LISTENER_NAME_CONTROLLER_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret";
            # Other
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    broker-1:
        image: confluentinc/cp-kafka:7.6.1
        container_name: broker-1
        depends_on:
            controller-1:
                condition: service_started
            controller-2:
                condition: service_started
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 3
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:29092,EXTERNAL://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL,CONTROLLER:SASL_SSL
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # SASL properties
            KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN

            # JAAS config - broker listeners
            KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";
            KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";

            # JASS config - controller
            KAFKA_LISTENER_NAME_CONTROLLER_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret";

            # other
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    broker-2:
        image: confluentinc/cp-kafka:7.6.1
        container_name: broker-2
        depends_on:
            controller-1:
                condition: service_started
            controller-2:
                condition: service_started
        ports:
            - "9093:9093"
        environment:
            KAFKA_NODE_ID: 4
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:29092,EXTERNAL://localhost:9093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL,CONTROLLER:SASL_SSL
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # SASL properties
            KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN

            # JAAS config - broker listeners
            KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";
            KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";

            # JASS config - controller
            KAFKA_LISTENER_NAME_CONTROLLER_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret";

            # other
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    broker-3:
        image: confluentinc/cp-kafka:7.6.1
        container_name: broker-3
        depends_on:
            controller-1:
                condition: service_started
            controller-2:
                condition: service_started
        ports:
            - "9094:9094"
        environment:
            KAFKA_NODE_ID: 5
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9094
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:29092,EXTERNAL://localhost:9094
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL,CONTROLLER:SASL_SSL
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # SASL properties
            KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN

            # JAAS config - broker listeners
            KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";
            KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_producer="producer-secret" user_consumer="consumer-secret" user_mohammad="strongpassword";

            # JASS config - controller
            KAFKA_LISTENER_NAME_CONTROLLER_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret";

            # other
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server
