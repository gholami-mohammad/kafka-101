---
services:
    ssl-generator:
        image: confluentinc/cp-kafka:7.6.1
        container_name: ssl-generator
        volumes:
            - ./secrets:/etc/kafka/secrets
        environment:
            - KEYSTORE_PASSWORD=keystoreTKtPspFDZ2CYz3EluZMha24Drp
            - TRUSTSTORE_PASSWORD=truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            - CA_PASSWORD=caRstSWx9LvFSs3cjnBVkk1UhMyQQ
            - CLIENT_PASS=clinetOLPrcS2pLLeN8WJmr1EVmEFCc
        command: >
            bash -c '
                mkdir -p /etc/kafka/secrets/ca
                mkdir -p /etc/kafka/secrets/server
                mkdir -p /etc/kafka/secrets/client

                cd /etc/kafka/secrets/server

                if [ -f "kafka.server.keystore.jks" ]; then
                    echo "Certificates already exist. Skipping generation."
                    exit 0
                fi

                echo "Generating SSL Certificates..."

                # all steps have same order as they are in 61-security-encryption.md

                # 1. Generate CA
                cd /etc/kafka/secrets/ca
                openssl req -new -x509 -newkey rsa:4096 -keyout ca-key -out ca-cert -days 3650 -subj "/CN=Kafka-Security-CA" -passout pass:$$CA_PASSWORD

                # 2. Create Truststore and import the CA
                cd /etc/kafka/secrets/server
                cp /etc/kafka/secrets/ca/ca-cert /etc/kafka/secrets/server

                keytool -keystore kafka.server.truststore.jks -alias CARoot -import -file ca-cert -storepass $$TRUSTSTORE_PASSWORD -keypass $$TRUSTSTORE_PASSWORD -noprompt

                # 3. Generate Keystore
                cd /etc/kafka/secrets/server

                keytool -genkeypair -keystore kafka.server.keystore.jks -keyalg RSA -keysize 2048 -alias kafka-broker -validity 3650 -storepass $$KEYSTORE_PASSWORD -keypass $$KEYSTORE_PASSWORD -storetype pkcs12 -dname "CN=localhost" -ext SAN=DNS:broker-1,DNS:broker-2,DNS:broker-3,DNS:controller-1,DNS:controller-2,DNS:localhost,IP:127.0.0.1

                # 4. Create Certificate Signing Request (CSR)
                keytool -keystore kafka.server.keystore.jks -certreq -alias kafka-broker -file server-cert-sign-request -storepass $$KEYSTORE_PASSWORD -keypass $$KEYSTORE_PASSWORD

                # 5. Sign the Certificate with the CA
                cp /etc/kafka/secrets/server/server-cert-sign-request /etc/kafka/secrets/ca

                cd /etc/kafka/secrets/ca

                openssl x509 -req -CA ca-cert -CAkey ca-key -in server-cert-sign-request -out cert-signed -days 3650 -CAcreateserial -passin pass:$$CA_PASSWORD

                # 6. Import CA into Keystore
                cp /etc/kafka/secrets/ca/ca-cert /etc/kafka/secrets/server
                cd /etc/kafka/secrets/server


                keytool -importcert -keystore kafka.server.keystore.jks -alias CARoot -file ca-cert -storepass $$KEYSTORE_PASSWORD -keypass $$KEYSTORE_PASSWORD -noprompt

                # 7. Import Signed Certificate into Keystore
                cp /etc/kafka/secrets/ca/cert-signed /etc/kafka/secrets/server

                keytool -importcert -keystore kafka.server.keystore.jks -alias kafka-broker -file cert-signed -storepass $$KEYSTORE_PASSWORD -keypass $$KEYSTORE_PASSWORD -noprompt

                # 8. nothing to do

                # 9. Creating client truststore
                cd /etc/kafka/secrets/client
                cp /etc/kafka/secrets/ca/ca-cert /etc/kafka/secrets/client/ca-cert
                
                keytool -importcert -keystore kafka.client.truststore.jks -alias CARoot -file ca-cert -storepass $$CLIENT_PASS -keypass $$CLIENT_PASS -noprompt
                
                # 10. create client properties
                touch client.properties
                echo security.protocol=SSL > client.properties
                echo ssl.truststore.location=./kafka.client.truststore.jks >> client.properties
                echo ssl.truststore.password=$$CLIENT_PASS >> client.properties

                # 11. Cleanup and Permissions
                chmod 644 /etc/kafka/secrets/server/kafka.server.keystore.jks 
                chmod 644 /etc/kafka/secrets/server/kafka.server.truststore.jks
                chmod 644 /etc/kafka/secrets/client/kafka.client.truststore.jks

                echo "SSL Certificates generated successfully!"
            '

    controller-1:
        image: confluentinc/cp-kafka:7.6.1
        container_name: controller-1
        depends_on:
            ssl-generator:
                condition: service_completed_successfully
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SSL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    controller-2:
        image: confluentinc/cp-kafka:7.6.1
        container_name: controller-2
        depends_on:
            ssl-generator:
                condition: service_completed_successfully
        environment:
            KAFKA_NODE_ID: 2
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SSL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    broker-1:
        image: confluentinc/cp-kafka:7.6.1
        container_name: broker-1
        depends_on:
            controller-1:
                condition: service_started
            controller-2:
                condition: service_started
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 3
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:29092,EXTERNAL://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL,CONTROLLER:SSL
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # KAFKA_SSL_CLIENT_AUTH: "required"
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    broker-2:
        image: confluentinc/cp-kafka:7.6.1
        container_name: broker-2
        depends_on:
            controller-1:
                condition: service_started
            controller-2:
                condition: service_started
        ports:
            - "9093:9093"
        environment:
            KAFKA_NODE_ID: 4
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-2:29092,EXTERNAL://localhost:9093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL,CONTROLLER:SSL
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # KAFKA_SSL_CLIENT_AUTH: "required"
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    broker-3:
        image: confluentinc/cp-kafka:7.6.1
        container_name: broker-3
        depends_on:
            controller-1:
                condition: service_started
            controller-2:
                condition: service_started
        ports:
            - "9094:9094"
        environment:
            KAFKA_NODE_ID: 5
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9094
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-3:29092,EXTERNAL://localhost:9094
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL,CONTROLLER:SSL
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:29093,2@controller-2:29093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            # SSL properties
            KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_KEY_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
            # KAFKA_SSL_CLIENT_AUTH: "required"
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    schema-registry:
        image: confluentinc/cp-schema-registry:7.6.1
        container_name: schema-registry
        depends_on:
            - broker-1
            - broker-2
            - broker-3
        ports:
            - "8081:8081"
        environment:
            SCHEMA_REGISTRY_HOST_NAME: schema-registry
            SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "broker-1:29092,broker-2:29092,broker-3:29092"
            SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SSL
            SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            SCHEMA_REGISTRY_KAFKASTORE_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    connect:
        image: confluentinc/cp-kafka-connect:7.6.1
        container_name: connect
        depends_on:
            - broker-1
            - broker-2
            - broker-3
            - schema-registry

        ports:
            - "8083:8083"
        environment:
            CONNECT_BOOTSTRAP_SERVERS: "broker-1:29092,broker-2:29092,broker-3:29092"
            CONNECT_REST_PORT: 8083
            CONNECT_GROUP_ID: compose-connect-group
            CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
            CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
            CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
            CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
            CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
            CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
            CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
            CONNECT_REST_ADVERTISED_HOST_NAME: connect

            # Tell Connect to use SSL to talk to Brokers
            CONNECT_SECURITY_PROTOCOL: SSL

            # SSL Truststore & Keystore configuration
            CONNECT_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            CONNECT_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            CONNECT_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            CONNECT_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp

            # Disable Hostname verification for the internal Docker network
            CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

            # Producer and Consumer specific SSL settings (required for internal topics)
            CONNECT_PRODUCER_SECURITY_PROTOCOL: SSL
            CONNECT_PRODUCER_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            CONNECT_PRODUCER_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            CONNECT_PRODUCER_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            CONNECT_PRODUCER_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            CONNECT_PRODUCER_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

            CONNECT_CONSUMER_SECURITY_PROTOCOL: SSL
            CONNECT_CONSUMER_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            CONNECT_CONSUMER_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            CONNECT_CONSUMER_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            CONNECT_CONSUMER_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            CONNECT_CONSUMER_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8080:8080"
        depends_on:
            - broker-1
            - broker-2
            - broker-3
        environment:
            # Cluster definition
            KAFKA_CLUSTERS_0_NAME: local-kraft-ssl
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:29092,broker-2:29092,broker-3:29092

            # SSL Configuration
            KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SSL
            KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.truststore.jks
            KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: truststroreXa6DlDATAOHLTaIOcbRGZdpEYOx0
            KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/server/kafka.server.keystore.jks
            KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_PASSWORD: keystoreTKtPspFDZ2CYz3EluZMha24Drp
            # Disable endpoint identification for internal Docker network
            KAFKA_CLUSTERS_0_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

            KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

            KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: local-connect
            KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
        volumes:
            - ./secrets/server:/etc/kafka/secrets/server
